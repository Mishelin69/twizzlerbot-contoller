syntax = "proto3";

package koje_booker_hub.protobufs;
option go_package = "koje-booker-hub/src/protobufs";

message Request {
    uint64 id = 1;
    uint32 version = 2;
    RequestType type = 3;
    bool has_params = 4;
    string params = 5;
}

enum RequestType {
    UNKNOWN_REQUEST_TYPE = 0;
    GET_CURRENT_RESERVATION = 1;
    GET_NEXT_RESERVATION = 2;
    POST_EXTEND_RESERVATION = 3;
    POST_RELEASE_RESERVATION = 4;
    GET_PREVIOUS_RESERVATIONS = 5;
    GET_NUM_OF_PAGES_FOR_PREVIOUS_RESERVATIONS = 6;
    GET_UPCOMING_RESERVATIONS = 7;
    GET_NUM_OF_PAGES_FOR_UPCOMING_RESERVATIONS = 8;
    POST_CREATE_RESERVATION = 9;
    GET_DELIVERY_TABLE = 10;
}