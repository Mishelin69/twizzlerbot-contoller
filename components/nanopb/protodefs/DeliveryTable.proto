syntax = "proto3";
import "nanopb.proto";

package koje_booker_hub.protobufs;
option go_package = "koje-booker-hub/src/protobufs";

message DeliveryTable {
    uint64 id = 1;
    repeated DeliveryTableItem packages = 2 [(nanopb).max_count = 64];
}

message DeliveryTableItem {
    string name = 1 [(nanopb).max_size = 32];
    string version = 2 [(nanopb).max_size = 256];
}
