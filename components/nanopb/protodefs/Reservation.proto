syntax = "proto3";
import "nanopb.proto";

package koje_booker_hub.protobufs;
option go_package = "koje-booker-hub/src/protobufs";

import "ReservationStatus.proto";

message Reservation {
    uint64 id = 1;
    ReservationStatus status = 2;
    string reserved_by = 3 [(nanopb).max_size = 128];
    string start_time = 4 [(nanopb).max_size = 17];
    string end_time = 5 [(nanopb).max_size = 17];
    string comment = 6 [(nanopb).max_size = 128];
    string remark = 7 [(nanopb).max_size = 128];
}
