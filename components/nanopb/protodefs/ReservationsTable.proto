syntax = "proto3";
import "nanopb.proto";

package koje_booker_hub.protobufs;
option go_package = "koje-booker-hub/src/protobufs";

message ReservationsTable {
    uint64 id = 1;
    uint32 page = 2;
    repeated ReservationTableItem reservations = 3 [(nanopb).max_count = 10];
}

message ReservationTableItem {
    string start_time = 1 [(nanopb).max_size = 17];
    string end_time = 2 [(nanopb).max_size = 17];
    string reserved_by = 3 [(nanopb).max_size = 128];
}
