syntax = "proto3";

package koje_booker_hub.protobufs;
option go_package = "koje-booker-hub/src/protobufs";

message PostResponse {
    uint64 id = 1;
    ResponseStatusCode status_code = 2;
    string message = 3;
}

enum ResponseStatusCode {
    UNKNOWN_STATUS_CODE = 0;
    SUCCESS = 1;
    BAD_REQUEST = 2;
    SERVER_ERROR = 3;
    OLD_VERSION = 4;
}